name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify slack success
        id: slack # IMPORTANT: reference this step ID value in future Slack steps
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: https://github.com/voxmedia/github-action-slack-notify-build@v1
        with:
          channel: ci
          status: STARTING
          color: warning

  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - run: "apt-get update && apt-get install -y git-lfs"
      - uses: actions/checkout@v3
        with:
          lfs: true

      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - run: |
          cd nestjs
          pwd
          ls -l
          npm ci
          npm run lint
          npm run test
          npm run buildall

  frontend:
    runs-on: ubuntu-latest
    steps:
      - run: "apt-get update && apt-get install -y git-lfs"
      - uses: actions/checkout@v3
        with:
          lfs: true

      - uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - run: |
          cd front
          npm ci
          npm run lint
          npm run build

  # publish:
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'promote' && github.event.action == 'published' && github.ref == 'refs/tags/v*'
  #   steps:
  #     - uses: actions/checkout@v3
  #       with:
  #         lfs: true

  #     - name: Build website
  #       uses: docker/build-push-action@v2
  #       with:
  #         context: ./docs/website
  #         file: ./docs/website/Dockerfile
  #         push: true
  #         tags: phoenix741/woodstock-backup-website:latest

  #     - name: Build server
  #       uses: docker/build-push-action@v2
  #       with:
  #         context: .
  #         file: ./Dockerfile
  #         push: true
  #         tags: phoenix741/woodstock-backup:latest

  notify:
    runs-on: ubuntu-latest
    needs:
      - start
      - backend
      - frontend
      #- publish
    if: always()
    steps:
      - run: echo ${{ join(needs.*.result, ' ') }} contains(needs.*.result , 'failure')
      - name: Notify slack success
        if: "!contains(needs.*.result , 'failure')"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: https://github.com/voxmedia/github-action-slack-notify-build@v1
        with:
          message_id: ${{ needs.start.steps.slack.outputs.message_id }}
          channel: ci
          status: SUCCESS
          color: good

      - name: Notify slack fail
        if: contains(needs.*.result, 'failure')
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: https://github.com/voxmedia/github-action-slack-notify-build@v1
        with:
          message_id: ${{ needs.start.steps.slack.outputs.message_id }}
          channel: ci
          status: FAILED
          color: danger
