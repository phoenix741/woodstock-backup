syntax = "proto3";

package woodstock;

// Status Code for reply
enum StatusCode {
  Ok = 0;
  Failed = 1;
}

// File manifest used to store the content of a file
message FileManifest {
  message FileManifestStat {
    int64 ownerId = 1;
    int64 groupId = 2;
    int64 size = 3;
    int64 lastRead = 4;
    int64 lastModified = 5;
    int64 created = 6;
    int64 mode = 7;
  }

  message FileManifestAcl {
    string user = 1;
    string group = 2;
    int32 mask = 3;
    int32 other = 4;
  }

  bytes path = 1;
  FileManifestStat stats = 2;
  map<string, bytes> xattr = 5;
  repeated FileManifestAcl acl = 6;
  repeated bytes chunks = 3;
  bytes sha256 = 4;
}

// Journal entry
message FileManifestJournalEntry {
  enum EntryType {
    // Add a new file
    ADD = 0;
    // Modify a file
    MODIFY = 1;
    // Remove a file
    REMOVE = 2;
  }

  EntryType type = 1;
  FileManifest manifest = 2;
}

// Log entry
message LogEntry {
  enum LogLevel {
    DEBUG = 0;
    INFO = 1;
    WARN = 2;
    ERROR = 3;
    FATAL = 4;
  }

  LogLevel level = 1;
  string line = 2;
}

message FileChunk {
  bytes data = 1;
}

message RefreshCacheHeader {
  bytes sharePath = 1;
}

message RefreshCacheRequest {
  oneof content {
    RefreshCacheHeader header = 2;
    FileManifest manifest = 1;
  }
}

message RefreshCacheReply {
  StatusCode code = 1;
  string message = 2;
}

message LaunchBackupHeader {
  bytes sharePath = 1;
  repeated bytes includes = 2;
  repeated bytes excludes = 3;

  uint32 lastBackupNumber = 4;
  uint32 newBackupNumber = 5;
}

message LaunchBackupFooter {
  StatusCode code = 1;
}

message LaunchBackupRequest {
  oneof content {
    LaunchBackupHeader header = 1;
    FileManifestJournalEntry entry = 2;
    LaunchBackupFooter footer = 3;
  }
}

message LaunchBackupResponse {
  StatusCode code = 1;
  bool needRefreshCache = 2;
  string message = 3;
}

message LaunchBackupReply {
  oneof content {
    LaunchBackupResponse response = 2;
    FileManifestJournalEntry entry = 1;
  }
}

message GetChunkRequest {
  bytes filename = 1;
  uint64 position = 2;
  uint64 size = 3;
  bytes sha256 = 4;
}

message StreamLogRequest {

}

message ExecuteCommandRequest {
  string command = 1;
}

message ExecuteCommandReply {
  int32 code = 1;
  string stdout = 2;
  string stderr = 3;
}

service WoodstockClientService {
  // 0. Execute a command directly on the client
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandReply) {}

  // 1. The server launch the backup with a new number. The client will browse the client computer
  //    and will send all new file to the server
  rpc LaunchBackup(stream LaunchBackupRequest) returns (stream LaunchBackupReply) {}

  // 2. The client want a cache refresh, the server will send the new cache for the last backup
  //    number. (the backup number referenced previously)
  rpc RefreshCache(stream RefreshCacheRequest) returns (RefreshCacheReply) {}

  // 3. When the server receive a journal entry, the server will compare the chunk with the manifest
  //    and ask all necessary chunk to the client.
  rpc GetChunk(GetChunkRequest) returns (stream FileChunk) {}

  // In parallele, the server will open a stream for the client to send log file.
  rpc StreamLog(StreamLogRequest) returns (stream LogEntry) {}
}
