[package]
edition = "2021"
name = "woodstock_shared-rs"
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Default enable napi4 feature, see https://nodejs.org/api/n-api.html#node-api-version-matrix
napi = { version = "2.12.0", default-features = false, features = ["napi4"] }
napi-derive = "2.12.2"
tempfile = "3.2.0"
flate2 = "1.0"
# tonic can be used if we need to use grpc
prost = "0.11"


[build-dependencies]
napi-build = "2.0.1"
prost-build = { version = "0.11" }

[profile.release]
lto = true
